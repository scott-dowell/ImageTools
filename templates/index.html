<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ImageTools</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fa; }
    .hero { background: linear-gradient(135deg, #0d6efd, #6f42c1); color: white; }
    .card { border-radius: 1rem; }
    pre { white-space: pre-wrap; word-break: break-word; }
    .folder-table { min-width: 980px; }
    .folder-table th, .folder-table td { white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="hero card border-0 shadow-sm mb-4">
      <div class="card-body p-4">
        <h1 class="h3 mb-2">ImageTools</h1>
        <p class="mb-0">Browse a folder tree and convert supported images to WebP in a structured output folder.</p>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-7">
            <label class="form-label">Root folder</label>
            <input id="rootFolder" class="form-control" placeholder="C:\\Photos" />
          </div>
          <div class="col-md-2">
            <label class="form-label">Quality</label>
            <input id="quality" class="form-control" type="number" min="1" max="100" value="85" />
          </div>
          <div class="col-md-3 d-flex gap-2">
            <button id="scanBtn" class="btn btn-outline-primary w-100">Scan</button>
            <button id="convertBtn" class="btn btn-primary w-100">Convert</button>
          </div>
        </div>
        <div class="mt-3">
          <div class="d-flex justify-content-between small text-secondary mb-1">
            <span id="progressLabel">Idle</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress" style="height: 8px;">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
          </div>
          <div id="progressDetail" class="small text-muted mt-2">No conversion running.</div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white">Scan result</div>
          <div class="card-body">
            <div id="summary" class="text-secondary">No scan performed yet.</div>
            <div id="folderSummary" class="mt-3"></div>
            <div id="resultsMeta" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const scanBtn = document.getElementById('scanBtn');
    const convertBtn = document.getElementById('convertBtn');
    const summary = document.getElementById('summary');
    const folderSummary = document.getElementById('folderSummary');
    const resultsMeta = document.getElementById('resultsMeta');
    const progressLabel = document.getElementById('progressLabel');
    const progressPercent = document.getElementById('progressPercent');
    const progressBar = document.getElementById('progressBar');
    const progressDetail = document.getElementById('progressDetail');
    let progressTimer = null;

    function renderFolderResults(items) {
      folderSummary.innerHTML = `
        <div class="border rounded overflow-hidden">
          <div class="bg-light px-3 py-2 border-bottom small fw-semibold text-secondary">Folder results</div>
          <div class="table-responsive" style="overflow-x: auto;">
            <table class="table table-sm table-hover align-middle mb-0 folder-table">
              <thead>
                <tr>
                  <th scope="col">Folder</th>
                  <th scope="col" class="text-end">Images</th>
                  <th scope="col">Progress</th>
                  <th scope="col">Converted</th>
                  <th scope="col">Skipped</th>
                  <th scope="col">Before</th>
                  <th scope="col">After</th>
                  <th scope="col">Saved</th>
                  <th scope="col">% Saved</th>
                  <th scope="col">Status</th>
                </tr>
              </thead>
              <tbody>
                ${items.map((item) => `
                  <tr>
                    <td class="text-break">${item.folder}</td>
                    <td class="text-end fw-semibold">${item.count}</td>
                    <td>${item.progress ?? 0}%</td>
                    <td>${item.converted ?? 0}</td>
                    <td>${item.skipped ?? 0}</td>
                    <td>${formatBytes(item.size_before_bytes ?? 0)}</td>
                    <td>${formatBytes(item.size_after_bytes ?? 0)}</td>
                    <td>${formatBytes(item.saved_bytes ?? 0)}</td>
                    <td>${item.savings_percent ?? 0}%</td>
                    <td><span class="badge text-bg-secondary">${item.status || 'pending'}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      let size = bytes;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }
      return `${size.toFixed(size >= 10 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
    }

    async function callApi(path, payload) {
      const response = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return response.json();
    }

    scanBtn.addEventListener('click', async () => {
      const root = document.getElementById('rootFolder').value;
      const data = await callApi('/api/scan', { root });
      summary.textContent = data.error ? data.error : `${data.count} image(s) found under ${data.root}`;
      if (data.error) {
        folderSummary.innerHTML = '';
        resultsMeta.textContent = '';
      } else if (data.folders && data.folders.length) {
        renderFolderResults(data.folders);
        resultsMeta.innerHTML = '';
      } else {
        folderSummary.innerHTML = '<div class="text-muted small">No image folders found.</div>';
        resultsMeta.textContent = '';
      }
    });

    async function updateProgress() {
      const response = await fetch('/api/progress');
      const data = await response.json();
      const percent = Math.round(data.progress_percent || 0);
      progressLabel.textContent = data.state === 'running' ? 'Converting…' : 'Idle';
      progressPercent.textContent = `${percent}%`;
      progressBar.style.width = `${percent}%`;
      progressDetail.textContent = data.current_file ? `Working on ${data.current_file}` : 'No conversion running.';
      if (data.folders && data.folders.length) {
        renderFolderResults(data.folders);
      }
      if (data.state === 'done') {
        clearInterval(progressTimer);
        summary.textContent = `${data.converted_count} image(s) converted, ${data.skipped_count} skipped`;
        resultsMeta.innerHTML = `<div class="small text-muted"><span class="fw-semibold">Completed:</span> ${data.completed_at || 'just now'}</div>`;
      }
    }

    convertBtn.addEventListener('click', async () => {
      const root = document.getElementById('rootFolder').value;
      const quality = document.getElementById('quality').value;
      const data = await callApi('/api/convert', { root, quality });
      if (data.error) {
        summary.textContent = data.error;
        resultsMeta.textContent = '';
        return;
      }
      summary.textContent = 'Conversion started.';
      resultsMeta.innerHTML = `<div class="small text-muted"><span class="fw-semibold">Run:</span> ${data.run ? data.run.root : root}</div>`;
      clearInterval(progressTimer);
      progressTimer = setInterval(updateProgress, 400);
    });
  </script>
</body>
</html>
